<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Нотатник">
<title>Нотатник</title>
<style>
:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--border:#48484a;--text:#ffffff;--muted:#8e8e93;--accent:#ffd60a;--red:#ff453a;--blue:#0a84ff;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;user-select:none;}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:32px;}
.pin-logo{font-size:3rem;}
.pin-title{font-size:1.2rem;font-weight:700;letter-spacing:1px;}
.pin-subtitle{font-size:.85rem;color:var(--muted);margin-top:-24px;}
.pin-dots{display:flex;gap:20px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--muted);transition:all .2s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
.pin-key{background:var(--bg2);border:none;color:var(--text);border-radius:50%;width:70px;height:70px;font-size:1.5rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.pin-key:active{background:var(--bg3);transform:scale(.92);}
.pin-key.empty{background:transparent;pointer-events:none;}
.pin-error-text{color:var(--red);font-size:.82rem;height:20px;text-align:center;}
.pin-forgot{color:var(--blue);font-size:.82rem;cursor:pointer;}
.screen{display:none;height:100vh;flex-direction:column;}
.screen.active{display:flex;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;padding-top:max(16px,env(safe-area-inset-top));background:var(--bg);border-bottom:1px solid var(--border);}
.header-title{font-size:1.1rem;font-weight:700;}
.header-btn{background:none;border:none;color:var(--accent);font-size:1rem;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:8px;font-family:inherit;}
.header-btn:active{opacity:.6;}
.header-btn.red{color:var(--red);}
.header-btn.muted{color:var(--muted);}
.search-wrap{padding:10px 16px;background:var(--bg);position:relative;}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none;}
.search-input{width:100%;background:var(--bg3);border:none;border-radius:10px;padding:9px 14px 9px 36px;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;}
.notes-list{flex:1;overflow-y:auto;padding:8px 16px;-webkit-overflow-scrolling:touch;}
.notes-list::-webkit-scrollbar{display:none;}
.note-item{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:opacity .15s;position:relative;overflow:hidden;}
.note-item:active{opacity:.7;}
.note-title{font-size:.95rem;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-preview{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-date{font-size:.7rem;color:var(--muted);margin-top:6px;}
.note-color-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px;}
.fab{position:fixed;bottom:max(28px,env(safe-area-inset-bottom,20px));right:24px;width:56px;height:56px;background:var(--accent);border-radius:50%;border:none;font-size:1.6rem;color:#000;cursor:pointer;box-shadow:0 4px 20px rgba(255,214,10,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.fab:active{transform:scale(.9);}
.color-strip{display:flex;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:border-color .15s;}
.color-dot.selected{border-color:#fff;}
.editor-toolbar{display:flex;gap:6px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.editor-toolbar::-webkit-scrollbar{display:none;}
.tool-btn{background:var(--bg3);border:none;color:var(--text);padding:7px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;}
.tool-btn:active{opacity:.6;}
.title-input{width:100%;background:transparent;border:none;color:var(--text);font-size:1.3rem;font-weight:700;padding:16px 20px 8px;font-family:inherit;outline:none;}
.title-input::placeholder{color:var(--muted);}
.note-editor{flex:1;width:100%;background:transparent;border:none;color:var(--text);font-size:.95rem;line-height:1.7;padding:8px 20px 100px;font-family:inherit;outline:none;resize:none;-webkit-overflow-scrolling:touch;}
.note-editor::placeholder{color:var(--muted);}
.stats-bar{padding:8px 20px;font-size:.72rem;color:var(--muted);text-align:center;border-top:1px solid var(--border);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);}
.empty-icon{font-size:3.5rem;opacity:.3;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border-radius:14px;width:280px;overflow:hidden;text-align:center;}
.modal-title{font-size:1rem;font-weight:700;padding:20px 20px 8px;}
.modal-sub{font-size:.83rem;color:var(--muted);padding:0 20px 16px;}
.modal-actions{border-top:1px solid var(--border);display:flex;}
.modal-btn{flex:1;padding:14px;background:none;border:none;font-family:inherit;font-size:.9rem;cursor:pointer;color:var(--blue);}
.modal-btn.danger{color:var(--red);font-weight:700;}
.modal-btn:not(:last-child){border-right:1px solid var(--border);}
.modal-btn:active{opacity:.6;}
.folder-tabs{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.folder-tabs::-webkit-scrollbar{display:none;}
.folder-tab{background:var(--bg3);border:none;color:var(--muted);padding:6px 14px;border-radius:20px;font-size:.78rem;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.folder-tab.active{background:var(--accent);color:#000;font-weight:600;}
</style>
</head>
<body>

<div id="pin-screen" class="pin-screen">
  <div class="pin-logo">🔐</div>
  <div class="pin-title" id="pin-title">Введіть PIN-код</div>
  <div class="pin-subtitle">Нотатник захищено</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error-text" id="pin-error"></div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput('0')">0</button>
    <button class="pin-key" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-forgot" onclick="pinForgot()">Забули PIN?</div>
</div>

<div class="screen" id="screen-list">
  <div class="header">
    <div style="font-size:.85rem;color:var(--muted)" id="notes-count">0 нотаток</div>
    <div class="header-title">📓 Нотатник</div>
    <button class="header-btn" onclick="openSettings()">⚙️</button>
  </div>
  <div class="folder-tabs">
    <button class="folder-tab active" onclick="setFolder('all',this)">Всі</button>
    <button class="folder-tab" onclick="setFolder('yellow',this)">🟡</button>
    <button class="folder-tab" onclick="setFolder('green',this)">🟢</button>
    <button class="folder-tab" onclick="setFolder('blue',this)">🔵</button>
    <button class="folder-tab" onclick="setFolder('red',this)">🔴</button>
    <button class="folder-tab" onclick="setFolder('purple',this)">🟣</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="Пошук нотаток..." oninput="renderList()">
  </div>
  <div class="notes-list" id="notes-list">
    <div class="empty" id="empty-state">
      <div class="empty-icon">📝</div>
      <div class="empty-text">Нотаток ще немає<br><span style="font-size:.8rem">Натисніть + щоб створити</span></div>
    </div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <button class="fab" onclick="newNote()">+</button>
</div>

<div class="screen" id="screen-editor">
  <div class="header">
    <button class="header-btn muted" onclick="goBack()">← Назад</button>
    <div class="header-title">Нотатка</div>
    <button class="header-btn red" onclick="confirmDelete()" id="btn-delete" style="display:none">🗑</button>
  </div>
  <div class="color-strip">
    <div class="color-dot selected" style="background:#ffd60a" data-color="yellow" onclick="setColor('yellow',this)"></div>
    <div class="color-dot" style="background:#30d158" data-color="green" onclick="setColor('green',this)"></div>
    <div class="color-dot" style="background:#0a84ff" data-color="blue" onclick="setColor('blue',this)"></div>
    <div class="color-dot" style="background:#ff453a" data-color="red" onclick="setColor('red',this)"></div>
    <div class="color-dot" style="background:#bf5af2" data-color="purple" onclick="setColor('purple',this)"></div>
    <div class="color-dot" style="background:#ff9f0a" data-color="orange" onclick="setColor('orange',this)"></div>
    <div class="color-dot" style="background:#64d2ff" data-color="cyan" onclick="setColor('cyan',this)"></div>
    <div class="color-dot" style="background:#8e8e93" data-color="gray" onclick="setColor('gray',this)"></div>
  </div>
  <div class="editor-toolbar">
    <button class="tool-btn" onclick="insertText('**','**')"><b>B</b></button>
    <button class="tool-btn" onclick="insertText('_','_')"><i>I</i></button>
    <button class="tool-btn" onclick="insertLine('• ')">• Список</button>
    <button class="tool-btn" onclick="insertLine('☐ ')">☐ Задача</button>
    <button class="tool-btn" onclick="insertLine('# ')">H1</button>
    <button class="tool-btn" onclick="insertLine('## ')">H2</button>
    <button class="tool-btn" onclick="insertLine('---')">— Лінія</button>
    <button class="tool-btn" onclick="insertDate()">📅 Дата</button>
    <button class="tool-btn" onclick="insertTime()">🕐 Час</button>
  </div>
  <input class="title-input" id="note-title" placeholder="Заголовок..." oninput="autoSave()">
  <textarea class="note-editor" id="note-body" placeholder="Починайте писати..." oninput="autoSave()"></textarea>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">Видалити нотатку?</div>
    <div class="modal-sub">Цю дію не можна скасувати</div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeDeleteModal()">Скасувати</button>
      <button class="modal-btn danger" onclick="deleteNote()">Видалити</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <div class="modal-title">⚙️ Налаштування</div>
    <div class="modal-sub" id="settings-info"></div>
    <div class="modal-actions" style="flex-direction:column;gap:0;">
      <button class="modal-btn" onclick="changePIN()" style="border-bottom:1px solid var(--border);">🔐 Змінити PIN</button>
      <button class="modal-btn danger" onclick="clearAll()" style="border-bottom:1px solid var(--border);">🗑 Очистити все</button>
      <button class="modal-btn" onclick="document.getElementById('settings-modal').classList.remove('open')">Закрити</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="change-pin-modal">
  <div class="modal-box" style="width:300px;">
    <div class="modal-title">🔐 Змінити PIN</div>
    <div class="modal-sub">Введіть новий 4-значний PIN</div>
    <div style="padding:0 20px 16px;">
      <input id="new-pin-input" type="number" placeholder="1234"
        style="width:100%;padding:10px 14px;background:var(--bg3);border:none;border-radius:10px;color:var(--text);font-size:1.4rem;text-align:center;outline:none;font-family:inherit;letter-spacing:8px;">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="document.getElementById('change-pin-modal').classList.remove('open')">Скасувати</button>
      <button class="modal-btn" style="color:var(--accent);font-weight:700;" onclick="saveNewPIN()">Зберегти</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_PIN='1234';
let pinBuffer='',pinAttempts=0;
function getPin(){return localStorage.getItem('notepad_pin')||DEFAULT_PIN;}
function pinInput(d){if(pinBuffer.length>=4)return;pinBuffer+=d;updatePinDots();if(pinBuffer.length===4)setTimeout(checkPin,200);}
function pinDelete(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();document.getElementById('pin-error').textContent='';}
function updatePinDots(err){for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.classList.toggle('filled',i<pinBuffer.length);d.classList.toggle('error',!!err);}}
function checkPin(){
  if(pinBuffer===getPin()){
    pinAttempts=0;
    document.getElementById('pin-screen').style.display='none';
    load();renderList();showScreen('list');
  }else{
    pinAttempts++;updatePinDots(true);
    const err=document.getElementById('pin-error');
    if(pinAttempts>=5){err.textContent='Забагато спроб. Зачекайте 30 сек.';setTimeout(()=>{pinAttempts=0;err.textContent='';},30000);}
    else{err.textContent='Невірний PIN · Спроба '+pinAttempts+'/5';}
    setTimeout(()=>{pinBuffer='';updatePinDots(false);},600);
  }
}
function pinForgot(){if(confirm('Скинути PIN до 1234?')){localStorage.removeItem('notepad_pin');alert('PIN скинуто до: 1234');pinBuffer='';updatePinDots();document.getElementById('pin-error').textContent='';}}
function changePIN(){document.getElementById('settings-modal').classList.remove('open');document.getElementById('new-pin-input').value='';document.getElementById('change-pin-modal').classList.add('open');}
function saveNewPIN(){const v=document.getElementById('new-pin-input').value;if(v.length!==4||isNaN(v)){alert('PIN має бути 4 цифри');return;}localStorage.setItem('notepad_pin',v);document.getElementById('change-pin-modal').classList.remove('open');alert('PIN змінено!');}

let notes=[],currentId=null,currentColor='yellow',currentFolder='all',saveTimer=null;
const COLORS={yellow:'#ffd60a',green:'#30d158',blue:'#0a84ff',red:'#ff453a',purple:'#bf5af2',orange:'#ff9f0a',cyan:'#64d2ff',gray:'#8e8e93'};
function load(){try{notes=JSON.parse(localStorage.getItem('notes_v2')||'[]');}catch(e){notes=[];}}
function save(){localStorage.setItem('notes_v2',JSON.stringify(notes));}
function renderList(){
  const q=document.getElementById('search-input').value.toLowerCase();
  let filtered=notes.filter(n=>{const mf=currentFolder==='all'||(n.color||'yellow')===currentFolder;const ms=!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q);return mf&&ms;}).sort((a,b)=>b.updated-a.updated);
  const list=document.getElementById('notes-list'),empty=document.getElementById('empty-state');
  document.getElementById('notes-count').textContent=notes.length+' '+plural(notes.length,'нотатка','нотатки','нотаток');
  if(!filtered.length){list.innerHTML='';list.appendChild(empty);empty.style.display='flex';document.getElementById('stats-bar').textContent='';return;}
  empty.style.display='none';
  const tc=notes.reduce((a,n)=>a+(n.body||'').length,0);
  document.getElementById('stats-bar').textContent=notes.length+' нотаток · '+tc+' символів';
  list.innerHTML=filtered.map(n=>{const color=COLORS[n.color]||COLORS.yellow;const preview=(n.body||'').replace(/\n/g,' ').substring(0,60)||'Порожня нотатка';
    return`<div class="note-item" onclick="openNote('${n.id}')"><div class="note-color-bar" style="background:${color}"></div><div class="note-title">${escHtml(n.title||'Без назви')}</div><div class="note-preview">${escHtml(preview)}</div><div class="note-date">${formatDate(n.updated)}</div></div>`;}).join('');
}
function newNote(){currentId='n'+Date.now();currentColor='yellow';document.getElementById('note-title').value='';document.getElementById('note-body').value='';document.getElementById('btn-delete').style.display='none';updateColorDots('yellow');showScreen('editor');setTimeout(()=>document.getElementById('note-title').focus(),300);}
function openNote(id){const n=notes.find(x=>x.id===id);if(!n)return;currentId=id;currentColor=n.color||'yellow';document.getElementById('note-title').value=n.title||'';document.getElementById('note-body').value=n.body||'';document.getElementById('btn-delete').style.display='';updateColorDots(currentColor);showScreen('editor');}
function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{const title=document.getElementById('note-title').value.trim();const body=document.getElementById('note-body').value;if(!title&&!body)return;const idx=notes.findIndex(n=>n.id===currentId);const note={id:currentId,title,body,color:currentColor,updated:Date.now()};if(idx>=0)notes[idx]=note;else notes.push(note);save();},500);}
function confirmDelete(){document.getElementById('delete-modal').classList.add('open');}
function closeDeleteModal(){document.getElementById('delete-modal').classList.remove('open');}
function deleteNote(){notes=notes.filter(n=>n.id!==currentId);save();closeDeleteModal();goBack();}
function setColor(c,el){currentColor=c;updateColorDots(c);autoSave();}
function updateColorDots(c){document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('selected',d.dataset.color===c));}
function insertText(b,a){const ta=document.getElementById('note-body');const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);ta.value=ta.value.substring(0,s)+b+sel+a+ta.value.substring(e);ta.selectionStart=ta.selectionEnd=s+b.length+sel.length+a.length;ta.focus();autoSave();}
function insertLine(p){const ta=document.getElementById('note-body'),s=ta.selectionStart;const before=ta.value.substring(0,s),after=ta.value.substring(s);const nl=before.length>0&&!before.endsWith('\n')?'\n':'';ta.value=before+nl+p+after;ta.selectionStart=ta.selectionEnd=before.length+nl.length+p.length;ta.focus();autoSave();}
function insertDate(){insertText(new Date().toLocaleDateString('uk-UA'),'');}
function insertTime(){insertText(new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}),'');}
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active');}
function goBack(){load();showScreen('list');renderList();}
function setFolder(f,el){currentFolder=f;document.querySelectorAll('.folder-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');load();setTimeout(renderList,50);}
function openSettings(){const kb=(JSON.stringify(notes).length/1024).toFixed(1);document.getElementById('settings-info').textContent=notes.length+' нотаток · '+kb+' КБ · PIN ✅';document.getElementById('settings-modal').classList.add('open');}
function clearAll(){if(!confirm('Видалити всі нотатки?'))return;notes=[];save();document.getElementById('settings-modal').classList.remove('open');renderList();}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function formatDate(ts){const diff=Date.now()-ts;if(diff<60000)return'щойно';if(diff<3600000)return Math.floor(diff/60000)+' хв тому';if(diff<86400000)return Math.floor(diff/3600000)+' год тому';if(diff<604800000)return Math.floor(diff/86400000)+' дн тому';return new Date(ts).toLocaleDateString('uk-UA');}
function plural(n,a,b,c){const m=n%10;if(n%100>=11&&n%100<=14)return c;if(m===1)return a;if(m>=2&&m<=4)return b;return c;}
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-tx>80&&tx<40&&document.getElementById('screen-editor').classList.contains('active'))goBack();});
</script>
</body>
</html>
